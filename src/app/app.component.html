<ion-app>

  <!-- 🟢 Menú SOLO cuando está autenticado -->
  <ion-menu *ngIf="authService.isAuthenticated()" side="end" content-id="main-content">
    <ion-content>
      <ion-list lines="none">
        <ion-item (click)="cerrarSesion()">
          <ion-label class="tipografia">Cerrar Sesión</ion-label>
        </ion-item>

        <ion-item href="/buscar-ciudadano">
          <ion-label class="tipografia">Buscar Ciudadano</ion-label>
        </ion-item>

        <ion-item *ngIf="authService.getUserRole() !== '4'" href="/registrar-ciudadano">
          <ion-label class="tipografia">Registrar Ciudadano</ion-label>
        </ion-item>

        <ion-item *ngIf="authService.getUserRole() !== '4'" href="/catalogo-servicios">
          <ion-label class="tipografia">Servicios</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- 🔴 Menú SOLO cuando NO está autenticado -->
  <ion-menu *ngIf="!authService.isAuthenticated()" side="end" content-id="main-content">
    <ion-content>
      <ion-list lines="none">
        <ion-item href="/home">
          <ion-label class="tipografia">Iniciar Sesión</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- Main content-->
  <ion-router-outlet id="main-content"></ion-router-outlet>

</ion-app>
